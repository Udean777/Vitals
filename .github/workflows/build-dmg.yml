name: Build & Release Unsigned DMG

on:
  push:
    tags:
      - 'v*' # Otomatis build dan release saat Anda membuat tag (contoh: git tag v1.0.0)
  workflow_dispatch: # Tetap bisa dijalankan manual

permissions:
  contents: write # Diperlukan untuk membuat Release di GitHub

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_16.0.app

    - name: Install create-dmg
      run: brew install create-dmg

    - name: Build and Archive (Unsigned)
      run: |
        xcodebuild clean archive \
          -project Vitals.xcodeproj \
          -scheme Vitals \
          -configuration Release \
          -archivePath $PWD/build/Vitals.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Create DMG
      run: |
        APP_PATH="build/Vitals.xcarchive/Products/Applications/Vitals.app"
        APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist")
        
        # Ekspor nama DMG ke Environment Variable agar terbaca di step berikutnya
        DMG_NAME="Vitals-v$APP_VERSION-Unsigned.dmg"
        echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
        
        create-dmg \
          --volname "Vitals Installer" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "Vitals.app" 150 190 \
          --hide-extension "Vitals.app" \
          --app-drop-link 450 190 \
          "$DMG_NAME" \
          "$APP_PATH"

    - name: Publish to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ env.DMG_NAME }}
        generate_release_notes: true

